<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <meta name="robots" content="noindex">
  <style>
    /* === THEME TOKENS === */
    :root {
      --if-blue: #0069bb;
      --if-blue-dark: #0056b3;

      /* Light (default) */
      --bg: linear-gradient(135deg, #f9f9f9, #eef3f9);
      --surface: #ffffff;
      --surface-2: #f9fafb;
      --text: #222;
      --muted: #4b5563;
      --border: #e0e4ea;
      --shadow: 0 3px 8px rgba(0,0,0,0.05);
      --shadow-lg: 0 6px 16px rgba(0,0,0,0.12);
      --inset: inset 0 1px 3px rgba(0,0,0,0.06);
      --hero-text: var(--if-blue);
      --modal-scrim: rgba(0, 20, 40, 0.55);
      --sticky: #fffbea;
      --badge: rgba(0,105,187,0.2);
      color-scheme: light;
    }

    [data-theme="dark"] {
      --bg: radial-gradient(1200px 800px at 70% 20%, #101827 0%, #0b1426 55%, #070b14 100%);
      --surface: #0f172a;
      --surface-2: #0b1324;
      --text: #e5e7eb;
      --muted: #9aa3b2;
      --border: #1f2937;
      --shadow: 0 3px 10px rgba(0,0,0,0.4);
      --shadow-lg: 0 10px 24px rgba(0,0,0,0.5);
      --inset: inset 0 1px 3px rgba(255,255,255,0.04);
      --hero-text: #8ecaff;
      --modal-scrim: rgba(2, 6, 23, 0.65);
      --sticky: #1f2937;
      --badge: rgba(142, 202, 255, 0.18);
      color-scheme: dark;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: radial-gradient(1200px 800px at 70% 20%, #101827 0%, #0b1426 55%, #070b14 100%);
        --surface: #0f172a;
        --surface-2: #0b1324;
        --text: #e5e7eb;
        --muted: #9aa3b2;
        --border: #1f2937;
        --shadow: 0 3px 10px rgba(0,0,0,0.4);
        --shadow-lg: 0 10px 24px rgba(0,0,0,0.5);
        --inset: inset 0 1px 3px rgba(255,255,255,0.04);
        --hero-text: #8ecaff;
        --modal-scrim: rgba(2, 6, 23, 0.65);
        --sticky: #1f2937;
        --badge: rgba(142, 202, 255, 0.18);
        color-scheme: dark;
      }
    }

    /* === GLOBAL === */
    html, body { height: 100%; }
    body {
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: var(--bg);
      margin: 0;
      padding: 20px;
      overflow: hidden;
      color: var(--text);
    }

    h1 {
      margin-bottom: 24px;
      text-align: center;
      width: 100%;
      font-size: 2.2rem;
      color: var(--hero-text);
      letter-spacing: -0.5px;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    /* === THEME TOGGLE === */
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1001;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    /* === SEARCH === */
    .search-box {
      position: relative;
      max-width: 600px;
      margin: auto;
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      z-index: 100;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 14px;
      font-size: 1.05em;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--inset);
      background: var(--surface);
      color: var(--text);
      transition: border 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input[type="text"]::placeholder { color: var(--muted); }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--if-blue);
      box-shadow: 0 0 0 3px var(--badge);
    }

    button {
      padding: 12px 20px;
      font-size: 1.05em;
      border: none;
      background: linear-gradient(135deg, var(--if-blue), var(--if-blue-dark));
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    button:active { transform: translateY(0); }

    /* === QUICK LINKS === */
    .quick-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
      max-width: 1100px;
      margin: 20px auto;
    }

    .quick-link {
      position: relative;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      background: var(--surface);
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .quick-link:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    .quick-link .link-info {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text);
      min-width: 0;
      overflow: hidden;
    }

    .quick-link img {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      object-fit: cover;
    }

    .quick-link a {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: flex;
      align-items: center;
      padding: 14px 16px;
      padding-left: 40px;
      padding-right: 44px;
      color: var(--if-blue);
      text-decoration: none;
      font-weight: 600;
      border-radius: 12px;
      transition: color 0.2s ease;
      overflow: hidden;
    }

    .quick-link .link-info span {
      white-space: wrap;
      overflow: hidden;
    }

    .quick-link a:hover { color: var(--if-blue-dark); }

    .quick-link .delete-btn {
      position: relative;
      z-index: 1;
      background: none;
      border: none;
      color: #d33;
      font-size: 16px;
      cursor: pointer;
      box-shadow: initial;
      transition: transform 0.15s ease;
    }

    .quick-link .delete-btn:hover { transform: scale(1.2); }

    .drag-handle {
      position: relative;
      z-index: 2;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 1px;
      margin-right: auto;
      cursor: grab;
      padding: 4px 6px;
      border-radius: 4px;
      opacity: 0.45;
      transition: opacity 0.15s;
      user-select: none;
    }

    .quick-link:hover .drag-handle { opacity: 0.75; }

    .quick-link.dragging {
      opacity: 0.35;
      cursor: grabbing;
    }

    .quick-link.drag-over {
      border-color: var(--if-blue);
      box-shadow: 0 0 0 2px var(--badge), var(--shadow-lg);
    }

    /* === MODAL === */
    .modal {
      display: none;
      position: fixed;
      z-index: 1001;
      inset: 0;
      background: var(--modal-scrim);
      backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

    .modal-content {
      background: var(--surface);
      color: var(--text);
      padding: 24px;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
    }

    .modal-content input {
      width: 100%;
      margin-bottom: 12px;
      padding: 10px;
      font-size: 1em;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text);
      transition: border 0.2s;
    }

    .modal-content input:focus {
      border-color: var(--if-blue);
      outline: none;
      box-shadow: 0 0 0 3px var(--badge);
    }

    /* === BLOCKS (Sticky Notes) === */
    .block {
      position: absolute;
      width: 300px;
      padding: 20px 20px 16px;
      padding-top: 35px;
      border: 1px solid var(--border);
      background-color: var(--sticky);
      border-radius: 10px;
      box-shadow: var(--shadow-lg);
      cursor: move;
      z-index: 5;
      transition: box-shadow 0.2s ease;
      color: var(--text);
    }

    .block .delete-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: none;
      border: none;
      color: #d33;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .block .delete-btn:hover { transform: scale(1.2); }

    .block-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .block-content {
      font-size: 14px;
      margin-bottom: 12px;
      line-height: 1.4;
      overflow: auto;
    }

    .block-content a {
      color: var(--if-blue);
      text-decoration: underline;
      word-break: break-all;
      cursor: pointer;
    }

    .block-date {
      font-size: 11px;
      opacity: 0.8;
    }

    /* === CONTROLS === */
    #controls { text-align: center; margin-bottom: 20px; z-index: 100; position: relative; }
    #controls button { margin: 0 5px; }

    /* === EFFECTS PANEL === */
    #effectsPanel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1004;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    #effectsList {
      display: none;
      flex-direction: column;
      gap: 6px;
      align-items: stretch;
    }

    #effectsList.open { display: flex; }

    #effectsList button {
      padding: 8px 14px;
      font-size: 0.82em;
      font-weight: 500;
      text-align: left;
      border-radius: 8px;
      white-space: nowrap;
      background: linear-gradient(135deg, #005fa8, #004d90);
      opacity: 0.85;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    #effectsList button[data-active="true"] {
      background: linear-gradient(135deg, #0080d4, #006ab3);
      opacity: 1;
      box-shadow: 0 0 0 2px rgba(100,180,255,0.4), 0 2px 5px rgba(0,0,0,0.3);
    }

    #effectsToggle {
      padding: 9px 16px;
      font-size: 0.88em;
    }

    /* === BREATHING GUIDE === */
    #breathDim {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(3px);
      z-index: 1002;
      transition: opacity 0.4s ease;
    }

    #breathingGuide {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1003;
      text-align: center;
      pointer-events: none;
      user-select: none;
    }

    #breathCircle {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, rgba(160,220,255,0.55), rgba(80,130,220,0.15));
      border: 2px solid rgba(130,190,255,0.45);
      margin: 0 auto 20px;
      transform-origin: center;
      will-change: transform, opacity;
    }

    #breathLabel {
      color: #c8dff5;
      font-size: 1.1em;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-shadow: 0 1px 8px rgba(0,0,0,0.6);
    }
  </style>
</head>

<body>
  <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌓 Theme</button>

  <h1>Search</h1>

  <div class="search-box">
    <input type="text" id="search" placeholder="Query..." autofocus
           onkeydown="if(event.key==='Enter'){execSearch();}" />
    <button onclick="execSearch()">Search</button>
  </div>

  <div id="controls">
    <button onclick="openModal()">+ Add Quick Link</button>
    <button onclick="createBlock()">+ Sticky Note</button>
  </div>

  <div class="quick-links" id="quickLinksContainer"></div>

  <div id="recentSearches" style="max-width: 500px; margin: 0 auto 20px; font-size: 0.95em;"></div>

  <div class="modal" id="linkModal">
    <div class="modal-content">
      <input type="text" id="linkUrl" placeholder="URL (https://...)" />
      <input type="text" id="linkText" placeholder="Link Text" />
      <input type="text" id="linkFavicon" placeholder="Favicon URL (optional)" />
      <button onclick="saveLink()">Save</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <div id="breathDim"></div>

  <div id="breathingGuide">
    <div id="breathCircle"></div>
    <div id="breathLabel">Inhale</div>
  </div>

  <div id="effectsPanel">
    <div id="effectsList">
      <button id="btn-butterflies" data-active="false" onclick="toggleEffect('butterflies')">&#x1F98B; Butterflies: Off</button>
      <button id="btn-fireflies"   data-active="false" onclick="toggleEffect('fireflies')"  >&#x2728; Fireflies: Off</button>
      <button id="btn-leaves"      data-active="false" onclick="toggleEffect('leaves')"     >&#x1F342; Leaves: Off</button>
      <button id="btn-rain"        data-active="false" onclick="toggleEffect('rain')"       >&#x1F327; Rain: Off</button>
      <button id="btn-breathe"     data-active="false" onclick="toggleEffect('breathe')"    >&#x1FAC1; Breathe: Off</button>
      <button id="btn-aurora"      data-active="false" onclick="toggleEffect('aurora')"     >&#x1F30C; Aurora: Off</button>
      <button id="btn-sunny"       data-active="false" onclick="toggleEffect('sunny')"      >&#x2600;&#xFE0F; Sunny Day: Off</button>
      <button id="btn-analogtv"    data-active="false" onclick="toggleEffect('analogtv')"   >&#x1F4FA; Analog TV: Off</button>
      <button id="btn-fireworks"   data-active="false" onclick="toggleEffect('fireworks')"  >&#x1F386; Fireworks: Off</button>
      <button id="btn-stars"       data-active="false" onclick="toggleEffect('stars')"      >&#x1F320; Starry Night: Off</button>
      <button id="btn-pond"        data-active="false" onclick="toggleEffect('pond')"       >&#x1F4A7; Pond: Off</button>
      <button id="btn-lavalamp"    data-active="false" onclick="toggleEffect('lavalamp')"   >&#x1F9EA; Lava Lamp: Off</button>
      <button id="btn-matrix"      data-active="false" onclick="toggleEffect('matrix')"     >&#x1F7E9; Matrix: Off</button>
    </div>
    <button id="effectsToggle" onclick="document.getElementById('effectsList').classList.toggle('open')">&#x2699; Effects</button>
  </div>

  <canvas id="particleCanvas"
    style="position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:1;"></canvas>

  <script type="module" src="js/main.js"></script>
</body>
</html>
