<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <!-- Mobile-first viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1221" />
    <title>Weight Tracker</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <main class="container">
        <header class="stack gap-2">
            <h1>Daily Weight</h1>
            <p class="lead">Track progress with one entry per day.</p>
        </header>

        <!-- Form first in DOM for mobile flow -->
        <form id="weightForm" class="card stack gap-3" novalidate>
            <label for="weight" class="label">Enter today’s weight</label>

            <div class="input-row">
                <input id="weight" name="weight" type="text" inputmode="decimal" autocomplete="off" enterkeyhint="done"
                    placeholder="e.g., 186.4" required />

                <button class="button" type="submit" id="saveBtn">Save</button>
            </div>

            <div class="helper">Tip: use tenths for better trends.</div>
            <div id="message" class="message" aria-live="polite" role="status" hidden></div>
        </form>

        <!-- Chart below on mobile; sits beside on larger screens -->
        <section class="card chart-card">
            <canvas id="weightChart"></canvas>
        </section>
    </main>

    <!-- libs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="script.js"></script>
</body>

</html>
