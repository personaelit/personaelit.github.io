<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Daily Weight</h1>
        <p class="lead">Track progress with one entry per day.</p>

        <div class="row">
            <form id="weightForm">
                <label for="weight">Enter today’s weight</label>
                <div class="input">
                    <input id="weight" type="number" step="0.1" placeholder="e.g., 186.4" />
                    <button class="button" type="submit">Save</button>
                </div>
                <div class="helper">Tip: use tenths for better trends.</div>
                <div id="message">Already logged for today — nice work!</div>
            </form>

            <div class="chart-card">
                <canvas id="weightChart" height="180"></canvas>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="script.js"></script>
</body>

</html>
