<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -50 100 100"
     fill="none" stroke="#1a1a1a" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5">
  <!-- central circle -->
  <circle cx="50" cy="0" r="18"/>
  <!-- rays: alternating long and short -->
  <line x1="50" y1="-18" x2="50" y2="-44"/>
  <line x1="50" y1="18"  x2="50" y2="44"/>
  <line x1="68" y1="-18" x2="80" y2="-36"/>
  <line x1="68" y1="18"  x2="80" y2="36"/>
  <line x1="32" y1="-18" x2="20" y2="-36"/>
  <line x1="32" y1="18"  x2="20" y2="36"/>
  <line x1="68" y1="0"   x2="90" y2="0"/>
  <line x1="32" y1="0"   x2="10" y2="0"/>
  <!-- short diagonal rays -->
  <line x1="64" y1="-13" x2="74" y2="-20"/>
  <line x1="64" y1="13"  x2="74" y2="20"/>
  <line x1="36" y1="-13" x2="26" y2="-20"/>
  <line x1="36" y1="13"  x2="26" y2="20"/>
</svg>
