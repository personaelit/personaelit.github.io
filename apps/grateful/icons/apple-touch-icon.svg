<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Background — iOS clips to rounded square automatically -->
  <rect width="180" height="180" fill="#1a1f1a"/>

  <!-- Leaf body -->
  <path
    d="M90 28
       C 112 28, 140 48, 140 84
       C 140 120, 116 153, 90 158
       C 64 153, 40 120, 40 84
       C 40 48, 68 28, 90 28 Z"
    fill="#7C9A7E"
  />

  <!-- Midrib -->
  <path
    d="M90 35 Q 92 96 90 150"
    stroke="#1a2e1c" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.45"
  />

  <!-- Left veins -->
  <path d="M90 70 Q 74 66 66 61" stroke="#1a2e1c" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.35"/>
  <path d="M90 96 Q 71 89 59 81" stroke="#1a2e1c" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.35"/>
  <path d="M90 118 Q 73 112 63 105" stroke="#1a2e1c" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- Right veins -->
  <path d="M91 70 Q 107 66 115 61" stroke="#1a2e1c" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.35"/>
  <path d="M91 96 Q 110 89 122 81" stroke="#1a2e1c" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.35"/>
  <path d="M91 118 Q 108 112 118 105" stroke="#1a2e1c" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.35"/>
</svg>
