<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spiral Generator HUD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --hud-bg: rgba(10, 10, 20, 0.9);
      --hud-border: rgba(0, 255, 200, 0.4);
      --hud-accent: #4af2c5;
      --hud-accent-soft: rgba(74, 242, 197, 0.15);
      --hud-text: #f5f5f5;
      --hud-muted: #9aa0b3;
      --hud-danger: #ff6b81;
      --hud-radius: 16px;
      --hud-shadow: 0 0 28px rgba(0, 0, 0, 0.8);
      --hud-blur: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: var(--hud-text);
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: radial-gradient(ellipse at center, #050710 0%, #02030a 40%, #000 100%);
    }

    /* HUD toggle button */
    .hud-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 20;
      background: radial-gradient(circle at top left, var(--hud-accent-soft), rgba(0, 0, 0, 0.85));
      border: 1px solid var(--hud-border);
      color: var(--hud-text);
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      backdrop-filter: blur(10px);
      box-shadow: var(--hud-shadow);
      user-select: none;
    }

    .hud-toggle span.icon {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 2px solid var(--hud-accent);
      box-shadow: 0 0 10px rgba(74, 242, 197, 0.65);
    }

    .hud-toggle:hover {
      background: radial-gradient(circle at top left, rgba(74, 242, 197, 0.22), rgba(0, 0, 0, 0.9));
      transform: translateY(-1px);
    }

    /* Drawer */
    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: min(340px, 100vw);
      z-index: 15;
      background: var(--hud-bg);
      border-left: 1px solid var(--hud-border);
      border-radius: var(--hud-radius) 0 0 var(--hud-radius);
      box-shadow: var(--hud-shadow);
      transform: translateX(100%);
      transition: transform 0.26s ease-out;
      backdrop-filter: blur(var(--hud-blur));
      display: flex;
      flex-direction: column;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      padding: 1rem 1.1rem 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .drawer-title {
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--hud-muted);
    }

    .drawer-badge {
      font-size: 0.7rem;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--hud-accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .drawer-body {
      padding: 0.75rem 1rem 1rem;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--hud-accent-soft) transparent;
    }

    .drawer-body::-webkit-scrollbar {
      width: 6px;
    }

    .drawer-body::-webkit-scrollbar-thumb {
      background-color: var(--hud-accent-soft);
      border-radius: 999px;
    }

    .section-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--hud-muted);
      margin-bottom: 0.4rem;
    }

    .section {
      margin-bottom: 1rem;
      padding: 0.65rem 0.75rem;
      border-radius: var(--hud-radius);
      border: 1px solid rgba(255, 255, 255, 0.03);
      background: radial-gradient(circle at top left, rgba(74, 242, 197, 0.05), rgba(0, 0, 0, 0.75));
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      margin-bottom: 0.6rem;
      font-size: 0.8rem;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      color: var(--hud-muted);
      font-weight: 500;
    }

    .control span.value {
      font-variant-numeric: tabular-nums;
      color: var(--hud-accent);
    }

    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        var(--hud-accent),
        rgba(74, 242, 197, 0.15)
      );
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--hud-accent);
      box-shadow: 0 0 0 4px rgba(74, 242, 197, 0.25);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--hud-accent);
      box-shadow: 0 0 0 4px rgba(74, 242, 197, 0.25);
      cursor: pointer;
    }

    select, input[type="color"] {
      width: 100%;
      padding: 0.4rem 0.5rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.6);
      color: var(--hud-text);
      font-size: 0.8rem;
      outline: none;
    }

    input[type="color"] {
      padding: 0;
      height: 28px;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
    }

    .row {
      display: flex;
      gap: 0.5rem;
    }

    .row > .control {
      flex: 1;
    }

    .buttons {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.4rem;
    }

    .btn {
      flex: 1;
      border-radius: 999px;
      padding: 0.4rem 0.6rem;
      font-size: 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(0, 0, 0, 0.7);
      color: var(--hud-text);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    .btn-primary {
      border-color: var(--hud-accent);
      box-shadow: 0 0 0 1px rgba(74, 242, 197, 0.35);
    }

    .btn-danger {
      border-color: var(--hud-danger);
      color: #ffd6dd;
      box-shadow: 0 0 0 1px rgba(255, 107, 129, 0.35);
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(0, 0, 0, 0.9);
    }

    .hint {
      font-size: 0.7rem;
      color: var(--hud-muted);
      margin-top: 0.5rem;
      line-height: 1.3;
    }

    .pill-row {
      display: flex;
      gap: 0.35rem;
      flex-wrap: wrap;
      margin-top: 0.4rem;
    }

    .pill {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 0.18rem 0.6rem;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--hud-muted);
    }

    @media (max-width: 600px) {
      .drawer {
        width: 100%;
        border-radius: var(--hud-radius) var(--hud-radius) 0 0;
        border-left: none;
        border-top: 1px solid var(--hud-border);
        transform: translateY(100%);
        right: 0;
        left: 0;
      }

      .drawer.open {
        transform: translateY(0);
      }

      .hud-toggle {
        right: 50%;
        transform: translateX(50%);
      }
    }
  </style>
</head>
<body>
  <canvas id="spiralCanvas"></canvas>

  <button class="hud-toggle" id="hudToggle">
    <span class="icon"></span>
    Controls
  </button>

  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <div>
        <div class="drawer-title">Spiral Generator HUD</div>
        <div style="font-size: 0.75rem; color: var(--hud-muted); margin-top: 2px;">
          HTML Canvas &bull; Live controls
        </div>
      </div>
      <span class="drawer-badge">v1</span>
    </div>
    <div class="drawer-body">
      <div class="section">
        <div class="section-label">System</div>
        <div class="control">
          <label>
            Spirals
            <span class="value" id="spiralCountValue">4</span>
          </label>
          <input id="spiralCount" type="range" min="1" max="12" value="4" step="1" />
        </div>
        <div class="row">
          <div class="control">
            <label>
              Speed
              <span class="value" id="speedValue">1.0x</span>
            </label>
            <input id="speed" type="range" min="0.1" max="3" value="1.0" step="0.1" />
          </div>
          <div class="control">
            <label>
              Line
              <span class="value" id="lineWidthValue">2px</span>
            </label>
            <input id="lineWidth" type="range" min="1" max="6" value="2" step="1" />
          </div>
        </div>
        <div class="control">
          <label>
            Trail
            <span class="value" id="trailValue">0.12</span>
          </label>
          <input id="trail" type="range" min="0.02" max="0.35" value="0.12" step="0.01" />
        </div>
      </div>

      <div class="section">
        <div class="section-label">Spiral Geometry</div>
        <div class="control">
          <label for="spiralType">Shape</label>
          <select id="spiralType">
            <option value="arch">Archimedean (linear)</option>
            <option value="log">Logarithmic (exponential)</option>
          </select>
        </div>
        <div class="control">
          <label>
            Radius growth
            <span class="value" id="growthValue">0.55</span>
          </label>
          <input id="growth" type="range" min="0.2" max="1.4" value="0.55" step="0.05" />
        </div>
        <div class="control">
          <label for="directionMode">Direction</label>
          <select id="directionMode">
            <option value="mixed">Alternating</option>
            <option value="cw">All clockwise</option>
            <option value="ccw">All counter</option>
          </select>
        </div>
        <div class="pill-row">
          <div class="pill">Center locked</div>
          <div class="pill">Continuous draw</div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Color Engine</div>
        <div class="control">
          <label for="colorMode">Mode</label>
          <select id="colorMode">
            <option value="rainbow">Rainbow orbit</option>
            <option value="mono">Single color</option>
            <option value="perSpiral">Per-spiral hue</option>
            <option value="pulse">Pulsing bands</option>
          </select>
        </div>
        <div class="row">
          <div class="control">
            <label for="baseHue">
              Base hue
              <span class="value" id="baseHueValue">180°</span>
            </label>
            <input id="baseHue" type="range" min="0" max="360" value="180" step="5" />
          </div>
          <div class="control">
            <label for="monoColor">Swatch</label>
            <input type="color" id="monoColor" value="#4af2c5" />
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Presets &amp; Utilities</div>
        <div class="buttons">
          <button class="btn btn-primary" id="randomize">Randomize</button>
          <button class="btn btn-danger" id="reset">Reset</button>
        </div>
        <p class="hint">
          Try: high speed + low trail for “laser beams”, or slow speed + thick lines for “nebula”
          frames. Everything runs live on the GPU-friendly canvas.
        </p>
      </div>
    </div>
  </aside>

  <script>
    (function () {
      const canvas = document.getElementById("spiralCanvas");
      const ctx = canvas.getContext("2d");

      let width = window.innerWidth;
      let height = window.innerHeight;
      let cx = width / 2;
      let cy = height / 2;

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        cx = width / 2;
        cy = height / 2;
      }

      window.addEventListener("resize", resize);
      resize();

      const config = {
        numSpirals: 4,
        baseSpeed: 0.03,
        speedScale: 1.0,
        lineWidth: 2,
        trailAlpha: 0.12,
        spiralType: "arch", // "arch" | "log"
        growth: 0.55,
        directionMode: "mixed", // mixed|cw|ccw
        colorMode: "rainbow", // rainbow|mono|perSpiral|pulse
        baseHue: 180,
        monoColor: "#4af2c5",
      };

      let spirals = [];

      function hexToRgba(hex) {
        const sanitized = hex.replace("#", "");
        const bigint = parseInt(sanitized, 16);
        const r = (bigint >> 16) & 255;
        const g = (bigint >> 8) & 255;
        const b = bigint & 255;
        return { r, g, b };
      }

      function resetSpirals() {
        spirals = [];
        for (let i = 0; i < config.numSpirals; i++) {
          const dir =
            config.directionMode === "cw"
              ? 1
              : config.directionMode === "ccw"
              ? -1
              : i % 2 === 0
              ? 1
              : -1;

          spirals.push({
            angle: Math.random() * Math.PI * 2,
            direction: dir,
            hueOffset: (i / Math.max(1, config.numSpirals)) * 360,
          });
        }

        // Hard clear background once when we rebuild the system
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.globalAlpha = 1;
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, width, height);
        ctx.restore();
      }

      // Initial population
      resetSpirals();

      // Animation loop
      let lastTime = performance.now();

      function drawFrame(now) {
        const dt = (now - lastTime) / 16.67; // relative to ~60fps
        lastTime = now;

        // Fade the canvas for trail effects
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.globalAlpha = config.trailAlpha;
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, width, height);
        ctx.restore();

        const maxRadius = Math.min(width, height) * 0.6;

        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.lineWidth = config.lineWidth;

        const monoRgb = hexToRgba(config.monoColor);

        spirals.forEach((s, index) => {
          const speed = config.baseSpeed * config.speedScale * s.direction * dt;
          const a1 = s.angle;
          const a2 = a1 + speed;

          const r1 =
            config.spiralType === "arch"
              ? config.growth * a1 * 40
              : Math.min(maxRadius, (Math.exp(config.growth * a1) - 1) * 20);

          const r2 =
            config.spiralType === "arch"
              ? config.growth * a2 * 40
              : Math.min(maxRadius, (Math.exp(config.growth * a2) - 1) * 20);

          const x1 = cx + r1 * Math.cos(a1);
          const y1 = cy + r1 * Math.sin(a1);
          const x2 = cx + r2 * Math.cos(a2);
          const y2 = cy + r2 * Math.sin(a2);

          // Color logic
          let strokeStyle = "#ffffff";
          const timeFactor = now * 0.0003;
          const baseHue = config.baseHue;

          switch (config.colorMode) {
            case "rainbow": {
              const hue = (a2 * 90 + timeFactor * 360 + s.hueOffset) % 360;
              strokeStyle = `hsl(${hue}, 100%, 50%)`;
              break;
            }
            case "perSpiral": {
              const hue =
                (s.hueOffset + timeFactor * 140 + baseHue) % 360;
              strokeStyle = `hsl(${hue}, 90%, 60%)`;
              break;
            }
            case "pulse": {
              const band = Math.sin(a2 * 2 + timeFactor * 6);
              const hue = (baseHue + band * 80 + s.hueOffset * 0.5) % 360;
              const lightness = 45 + band * 15;
              strokeStyle = `hsl(${hue}, 100%, ${lightness}%)`;
              break;
            }
            case "mono":
            default: {
              strokeStyle = `rgb(${monoRgb.r}, ${monoRgb.g}, ${monoRgb.b})`;
              break;
            }
          }

          ctx.strokeStyle = strokeStyle;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();

          s.angle = a2;
        });

        ctx.restore();
        requestAnimationFrame(drawFrame);
      }

      requestAnimationFrame(drawFrame);

      // --- UI Wiring ---

      const hudToggle = document.getElementById("hudToggle");
      const drawer = document.getElementById("drawer");

      hudToggle.addEventListener("click", () => {
        const isOpen = drawer.classList.toggle("open");
        if (isOpen && window.innerWidth <= 600) {
          // small UX affordance on mobile
          hudToggle.textContent = "Close Controls";
        } else {
          hudToggle.innerHTML = '<span class="icon"></span>Controls';
        }
      });

      // Controls
      const spiralCountInput = document.getElementById("spiralCount");
      const spiralCountValue = document.getElementById("spiralCountValue");
      const speedInput = document.getElementById("speed");
      const speedValue = document.getElementById("speedValue");
      const lineWidthInput = document.getElementById("lineWidth");
      const lineWidthValue = document.getElementById("lineWidthValue");
      const trailInput = document.getElementById("trail");
      const trailValue = document.getElementById("trailValue");
      const spiralTypeSelect = document.getElementById("spiralType");
      const directionModeSelect = document.getElementById("directionMode");
      const growthInput = document.getElementById("growth");
      const growthValue = document.getElementById("growthValue");
      const colorModeSelect = document.getElementById("colorMode");
      const baseHueInput = document.getElementById("baseHue");
      const baseHueValue = document.getElementById("baseHueValue");
      const monoColorInput = document.getElementById("monoColor");
      const randomizeBtn = document.getElementById("randomize");
      const resetBtn = document.getElementById("reset");

      spiralCountInput.addEventListener("input", (e) => {
        config.numSpirals = parseInt(e.target.value, 10);
        spiralCountValue.textContent = config.numSpirals;
        resetSpirals();
      });

      speedInput.addEventListener("input", (e) => {
        const v = parseFloat(e.target.value);
        config.speedScale = v;
        speedValue.textContent = v.toFixed(1) + "x";
      });

      lineWidthInput.addEventListener("input", (e) => {
        const v = parseInt(e.target.value, 10);
        config.lineWidth = v;
        lineWidthValue.textContent = v + "px";
      });

      trailInput.addEventListener("input", (e) => {
        const v = parseFloat(e.target.value);
        config.trailAlpha = v;
        trailValue.textContent = v.toFixed(2);
      });

      spiralTypeSelect.addEventListener("change", (e) => {
        config.spiralType = e.target.value;
        resetSpirals();
      });

      directionModeSelect.addEventListener("change", (e) => {
        config.directionMode = e.target.value;
        resetSpirals();
      });

      growthInput.addEventListener("input", (e) => {
        const v = parseFloat(e.target.value);
        config.growth = v;
        growthValue.textContent = v.toFixed(2);
      });

      colorModeSelect.addEventListener("change", (e) => {
        config.colorMode = e.target.value;
      });

      baseHueInput.addEventListener("input", (e) => {
        const v = parseInt(e.target.value, 10);
        config.baseHue = v;
        baseHueValue.textContent = v + "°";
      });

      monoColorInput.addEventListener("input", (e) => {
        config.monoColor = e.target.value;
      });

      randomizeBtn.addEventListener("click", () => {
        config.numSpirals = Math.floor(Math.random() * 8) + 3;
        spiralCountInput.value = config.numSpirals;
        spiralCountValue.textContent = config.numSpirals;

        const speed = +(0.2 + Math.random() * 2.4).toFixed(1);
        config.speedScale = speed;
        speedInput.value = speed;
        speedValue.textContent = speed.toFixed(1) + "x";

        const lw = Math.floor(Math.random() * 4) + 1;
        config.lineWidth = lw;
        lineWidthInput.value = lw;
        lineWidthValue.textContent = lw + "px";

        const trail = +(0.04 + Math.random() * 0.28).toFixed(2);
        config.trailAlpha = trail;
        trailInput.value = trail;
        trailValue.textContent = trail.toFixed(2);

        const growth = +(0.3 + Math.random() * 1.1).toFixed(2);
        config.growth = growth;
        growthInput.value = growth;
        growthValue.textContent = growth.toFixed(2);

        const modes = ["rainbow", "mono", "perSpiral", "pulse"];
        const dirs = ["mixed", "cw", "ccw"];
        const m = modes[Math.floor(Math.random() * modes.length)];
        const d = dirs[Math.floor(Math.random() * dirs.length)];
        config.colorMode = m;
        config.directionMode = d;
        colorModeSelect.value = m;
        directionModeSelect.value = d;

        config.baseHue = Math.floor(Math.random() * 360);
        baseHueInput.value = config.baseHue;
        baseHueValue.textContent = config.baseHue + "°";

        resetSpirals();
      });

      resetBtn.addEventListener("click", () => {
        spiralCountInput.value = 4;
        speedInput.value = 1.0;
        lineWidthInput.value = 2;
        trailInput.value = 0.12;
        spiralTypeSelect.value = "arch";
        directionModeSelect.value = "mixed";
        growthInput.value = 0.55;
        colorModeSelect.value = "rainbow";
        baseHueInput.value = 180;
        monoColorInput.value = "#4af2c5";

        config.numSpirals = 4;
        config.speedScale = 1.0;
        config.lineWidth = 2;
        config.trailAlpha = 0.12;
        config.spiralType = "arch";
        config.directionMode = "mixed";
        config.growth = 0.55;
        config.colorMode = "rainbow";
        config.baseHue = 180;
        config.monoColor = "#4af2c5";

        spiralCountValue.textContent = "4";
        speedValue.textContent = "1.0x";
        lineWidthValue.textContent = "2px";
        trailValue.textContent = "0.12";
        growthValue.textContent = "0.55";
        baseHueValue.textContent = "180°";

        resetSpirals();
      });
    })();
  </script>
</body>
</html>
