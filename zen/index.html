<!DOCTYPE html>
<html lang="en">

<head>
  <title>Zen Garden</title>
  <meta charset="UTF-8">
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="stylesheet" href="zen.css">
  <script src="zen.js"></script>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b0f14;
      overflow: hidden;
    }

    .peace {
      font-size: 15rem;
      line-height: 1;
      color: #fff;
      text-shadow:
        0 0 10px rgba(0, 105, 187, 0.8),
        0 0 20px rgba(0, 105, 187, 0.6),
        0 0 40px rgba(0, 105, 187, 0.4);
      animation: shimmer 3s infinite linear, glow 2s infinite alternate;
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes glow {
      from {
        text-shadow:
          0 0 5px rgba(0, 105, 187, 0.6),
          0 0 10px rgba(0, 105, 187, 0.5),
          0 0 20px rgba(0, 105, 187, 0.4);
      }

      to {
        text-shadow:
          0 0 20px rgba(0, 105, 187, 1),
          0 0 40px rgba(0, 105, 187, 0.9),
          0 0 60px rgba(0, 105, 187, 0.8);
      }
    }
  </style>
</head>

<body>
  <div class="peace">☮</div>
</body>

</html>
