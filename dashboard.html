<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard</title>
  <link id="page-favicon" rel="icon" href="https://www.stayonline.com/favicon.ico" type="image/x-icon" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <meta name="robots" content="noindex">  <style>
    /* === THEME TOKENS === */
    :root {
      --if-blue: #0069bb;
      --if-blue-dark: #0056b3;

      /* Light (default) */
      --bg: linear-gradient(135deg, #f9f9f9, #eef3f9);
      --surface: #ffffff;
      --surface-2: #f9fafb;
      --text: #222;
      --muted: #4b5563;
      --border: #e0e4ea;
      --shadow: 0 3px 8px rgba(0,0,0,0.05);
      --shadow-lg: 0 6px 16px rgba(0,0,0,0.12);
      --inset: inset 0 1px 3px rgba(0,0,0,0.06);
      --hero-text: var(--if-blue);
      --modal-scrim: rgba(0, 20, 40, 0.55);
      --sticky: #fffbea;
      --badge: rgba(0,105,187,0.2);
      color-scheme: light;
    }

    [data-theme="dark"] {
      --bg: radial-gradient(1200px 800px at 70% 20%, #101827 0%, #0b1426 55%, #070b14 100%);
      --surface: #0f172a;
      --surface-2: #0b1324;
      --text: #e5e7eb;
      --muted: #9aa3b2;
      --border: #1f2937;
      --shadow: 0 3px 10px rgba(0,0,0,0.4);
      --shadow-lg: 0 10px 24px rgba(0,0,0,0.5);
      --inset: inset 0 1px 3px rgba(255,255,255,0.04);
      --hero-text: #8ecaff;
      --modal-scrim: rgba(2, 6, 23, 0.65);
      --sticky: #1f2937;
      --badge: rgba(142, 202, 255, 0.18);
      color-scheme: dark;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: radial-gradient(1200px 800px at 70% 20%, #101827 0%, #0b1426 55%, #070b14 100%);
        --surface: #0f172a;
        --surface-2: #0b1324;
        --text: #e5e7eb;
        --muted: #9aa3b2;
        --border: #1f2937;
        --shadow: 0 3px 10px rgba(0,0,0,0.4);
        --shadow-lg: 0 10px 24px rgba(0,0,0,0.5);
        --inset: inset 0 1px 3px rgba(255,255,255,0.04);
        --hero-text: #8ecaff;
        --modal-scrim: rgba(2, 6, 23, 0.65);
        --sticky: #1f2937;
        --badge: rgba(142, 202, 255, 0.18);
        color-scheme: dark;
      }
    }

    /* === GLOBAL === */
    html, body { height: 100%; }
    body {
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: var(--bg);
      margin: 0;
      padding: 20px;
      overflow: hidden;
      color: var(--text);
    }

    h1 {
      margin-bottom: 24px;
      text-align: center;
      width: 100%;
      font-size: 2.2rem;
      color: var(--hero-text);
      letter-spacing: -0.5px;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    /* === THEME TOGGLE === */
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1001;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    /* === SEARCH === */
    .search-box {
      max-width: 600px;
      margin: auto;
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 14px;
      font-size: 1.05em;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--inset);
      background: var(--surface);
      color: var(--text);
      transition: border 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input[type="text"]::placeholder { color: var(--muted); }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--if-blue);
      box-shadow: 0 0 0 3px var(--badge);
    }

    button {
      padding: 12px 20px;
      font-size: 1.05em;
      border: none;
      background: linear-gradient(135deg, var(--if-blue), var(--if-blue-dark));
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    button:active { transform: translateY(0); }

    /* === QUICK LINKS === */
    .quick-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
      max-width: 1100px;
      margin: 20px auto;
    }

    .quick-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .quick-link:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }

    .quick-link .link-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      color: var(--text);
    }

    .quick-link img {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      object-fit: cover;
    }

    .quick-link a {
      color: var(--if-blue);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s ease;
    }

    .quick-link a:hover { color: var(--if-blue-dark); }

    .quick-link .delete-btn {
      background: none;
      border: none;
      color: #d33;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .quick-link .delete-btn:hover { transform: scale(1.2); }

    /* === MODAL === */
    .modal {
      display: none;
      position: fixed;
      z-index: 10;
      inset: 0;
      background: var(--modal-scrim);
      backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

    .modal-content {
      background: var(--surface);
      color: var(--text);
      padding: 24px;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
    }

    .modal-content input {
      width: 100%;
      margin-bottom: 12px;
      padding: 10px;
      font-size: 1em;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text);
      transition: border 0.2s;
    }

    .modal-content input:focus {
      border-color: var(--if-blue);
      outline: none;
      box-shadow: 0 0 0 3px var(--badge);
    }

    /* === BLOCKS (Sticky Notes) === */
    .block {
      position: absolute;
      width: 300px;
      padding: 20px 20px 16px;
      padding-top: 35px;
      border: 1px solid var(--border);
      background-color: var(--sticky);
      border-radius: 10px;
      box-shadow: var(--shadow-lg);
      cursor: move;
      z-index: 5;
      transition: box-shadow 0.2s ease;
      color: var(--text);
    }

    .block .delete-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: none;
      border: none;
      color: #d33;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .block .delete-btn:hover { transform: scale(1.2); }

    .block-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .block-content {
      font-size: 14px;
      margin-bottom: 12px;
      line-height: 1.4;
      overflow: auto;
    }

    .block-content a {
      color: var(--if-blue);
      text-decoration: underline;
      word-break: break-all;
      cursor: pointer;
    }

    .block-date {
      font-size: 11px;
      opacity: 0.8;
    }

    /* === CONTROLS === */
    #controls { text-align: center; margin-bottom: 20px; }
    #controls button { margin: 0 5px; }

    /* === EFFECTS PANEL === */
    #effectsPanel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1004;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    #effectsList {
      display: none;
      flex-direction: column;
      gap: 6px;
      align-items: stretch;
    }

    #effectsList.open { display: flex; }

    #effectsList button {
      padding: 8px 14px;
      font-size: 0.82em;
      font-weight: 500;
      text-align: left;
      border-radius: 8px;
      white-space: nowrap;
      background: linear-gradient(135deg, #005fa8, #004d90);
      opacity: 0.85;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    #effectsList button[data-active="true"] {
      background: linear-gradient(135deg, #0080d4, #006ab3);
      opacity: 1;
      box-shadow: 0 0 0 2px rgba(100,180,255,0.4), 0 2px 5px rgba(0,0,0,0.3);
    }

    #effectsToggle {
      padding: 9px 16px;
      font-size: 0.88em;
    }

    /* === BREATHING GUIDE === */
    #breathDim {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(3px);
      z-index: 1002;
      transition: opacity 0.4s ease;
    }

    #breathingGuide {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1003;
      text-align: center;
      pointer-events: none;
      user-select: none;
    }

    #breathCircle {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, rgba(160,220,255,0.55), rgba(80,130,220,0.15));
      border: 2px solid rgba(130,190,255,0.45);
      margin: 0 auto 20px;
      transform-origin: center;
      will-change: transform, opacity;
    }

    #breathLabel {
      color: #c8dff5;
      font-size: 1.1em;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-shadow: 0 1px 8px rgba(0,0,0,0.6);
    }
  </style>
</head>

<body>
  <button class="theme-toggle" id="themeToggle" title="Toggle theme">&#127763; Theme</button>

  <h1>Search</h1>

  <div class="search-box">
    <input type="text" id="search" placeholder="Query..." autofocus
           onkeydown="if(event.key==='Enter'){execSearch();}" />
    <button onclick="execSearch()">Search</button>
  </div>

  <div id="controls">
    <button onclick="openModal()">+ Add Quick Link</button>
    <button onclick="createBlock()">+ Sticky Note</button>
  </div>

  <div class="quick-links" id="quickLinksContainer"></div>

  <div id="recentSearches" style="max-width: 500px; margin: 0 auto 20px; font-size: 0.95em;"></div>

  <div class="modal" id="linkModal">
    <div class="modal-content">
      <input type="text" id="linkUrl" placeholder="URL (https://...)" />
      <input type="text" id="linkText" placeholder="Link Text" />
      <input type="text" id="linkFavicon" placeholder="Favicon URL (optional)" />
      <button onclick="saveLink()">Save</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <!-- Breathing dim overlay -->
  <div id="breathDim"></div>

  <!-- Breathing guide -->
  <div id="breathingGuide">
    <div id="breathCircle"></div>
    <div id="breathLabel">Inhale</div>
  </div>

  <!-- Effects panel -->
  <div id="effectsPanel">
    <div id="effectsList">
      <button id="btn-butterflies" data-active="false" onclick="toggleEffect('butterflies')">&#x1F98B; Butterflies: Off</button>
      <button id="btn-fireflies"   data-active="false" onclick="toggleEffect('fireflies')"  >&#x2728; Fireflies: Off</button>
      <button id="btn-leaves"      data-active="false" onclick="toggleEffect('leaves')"     >&#x1F342; Leaves: Off</button>
      <button id="btn-rain"        data-active="false" onclick="toggleEffect('rain')"       >&#x1F327; Rain: Off</button>
      <button id="btn-breathe"     data-active="false" onclick="toggleEffect('breathe')"    >&#x1FAC1; Breathe: Off</button>
      <button id="btn-aurora"      data-active="false" onclick="toggleEffect('aurora')"     >&#x1F30C; Aurora: Off</button>
      <button id="btn-sunny"       data-active="false" onclick="toggleEffect('sunny')"      >&#x2600;&#xFE0F; Sunny Day: Off</button>
      <button id="btn-analogtv"    data-active="false" onclick="toggleEffect('analogtv')"   >&#x1F4FA; Analog TV: Off</button>
    </div>
    <button id="effectsToggle" onclick="document.getElementById('effectsList').classList.toggle('open')">&#x2699; Effects</button>
  </div>

  <!-- Particle canvas: butterflies, fireflies, leaves, rain -->
  <canvas id="particleCanvas"
    style="position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:1;"></canvas>

  <script>
    /* =========================
       THEME
       ========================= */
    const THEME_KEY = "soDashboard.theme";
    const rootEl = document.documentElement;
    const themeToggleBtn = document.getElementById("themeToggle");

    function getSystemPrefersDark() {
      return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    }
    function applyTheme(theme) {
      if (!theme) { rootEl.removeAttribute("data-theme"); localStorage.removeItem(THEME_KEY); return; }
      rootEl.setAttribute("data-theme", theme);
      localStorage.setItem(THEME_KEY, theme);
    }
    function initTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      if (saved === "light" || saved === "dark") applyTheme(saved);
      else applyTheme(null);
      themeToggleBtn.addEventListener("click", () => {
        const current = rootEl.getAttribute("data-theme");
        if (!current) applyTheme(getSystemPrefersDark() ? "light" : "dark");
        else if (current === "light") applyTheme("dark");
        else if (current === "dark") applyTheme(null);
        themeToggleBtn.blur();
      });
      if (!rootEl.getAttribute("data-theme") && window.matchMedia) {
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
          if (!localStorage.getItem(THEME_KEY)) applyTheme(null);
        });
      }
    }

    /* =========================
       AVATAR/FAVICON
       ========================= */
    function hostnameFromUrl(url) {
      try { return new URL(url).hostname; }
      catch { return location.hostname; }
    }
    function pickColorFromString(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return `hsl(${Math.abs(hash) % 360}, 65%, 55%)`;
    }
    function generateAvatarDataURL(urlOrHost, size = 64) {
      const host = urlOrHost.includes(".") ? hostnameFromUrl("https://" + urlOrHost.replace(/^https?:\/\//, "")) : hostnameFromUrl(urlOrHost);
      const initial = (host[0] || "\u2022").toUpperCase();
      const bg = pickColorFromString(host);
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}">
        <defs><filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.2"/></filter></defs>
        <circle cx="${size/2}" cy="${size/2}" r="${size/2-2}" fill="${bg}" filter="url(#s)"/>
        <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle"
          font-family="Inter,Segoe UI,Arial" font-size="${size*0.52}" fill="#fff">${initial}</text>
      </svg>`;
      return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
    }
    function ensurePageFavicon() {
      const link = document.getElementById("page-favicon");
      if (!link || !link.href) return;
      const testImg = new Image();
      testImg.onerror = () => { link.href = generateAvatarDataURL(location.hostname || "site", 64); };
      testImg.src = link.href;
    }

    /* =========================
       APP STATE / LINKS / BLOCKS
       ========================= */
    const quickLinksKey = "quickLinks";
    const searchKey = "recentSearches";

    function saveRecentSearch(query) {
      let history = JSON.parse(localStorage.getItem(searchKey)) || [];
      history = [query, ...history.filter(s => s !== query)].slice(0, 10);
      localStorage.setItem(searchKey, JSON.stringify(history));
      renderRecentSearches();
    }
    function renderRecentSearches() {
      const container = document.getElementById("recentSearches");
      const history = JSON.parse(localStorage.getItem(searchKey)) || [];
      if (history.length === 0) { container.innerHTML = ""; return; }
      container.innerHTML = `<strong>Recent Searches:</strong> ${history.map(query =>
        `<a href="#" onclick="execSearch('${query.replace(/'/g, "\\'")}');return false;">${query}</a>`
      ).join(" \u2022 ")}`;
    }
    function getFavicon(url) {
      try { return new URL(url).origin + "/favicon.ico"; }
      catch { return "https://www.stayonline.com/favicon.ico"; }
    }
    function loadLinks() {
      renderLinks(JSON.parse(localStorage.getItem(quickLinksKey)) || []);
    }
    function renderLinks(links) {
      const container = document.getElementById("quickLinksContainer");
      container.innerHTML = "";
      links.forEach((link, i) => {
        const div = document.createElement("div");
        div.className = "quick-link";
        const a = document.createElement("a");
        a.href = link.url;
        const info = document.createElement("div");
        info.className = "link-info";
        const img = document.createElement("img");
        img.alt = "icon"; img.referrerPolicy = "no-referrer";
        img.src = link.favicon || getFavicon(link.url);
        img.onerror = () => { img.onerror = null; img.src = generateAvatarDataURL(hostnameFromUrl(link.url), 22); };
        const text = document.createElement("span");
        text.textContent = link.text;
        info.appendChild(img); info.appendChild(text); a.appendChild(info);
        const del = document.createElement("button");
        del.className = "delete-btn"; del.textContent = "\u2715";
        del.onclick = () => deleteLink(i);
        div.appendChild(a); div.appendChild(del);
        container.appendChild(div);
      });
    }
    function openModal() { document.getElementById("linkModal").style.display = "flex"; }
    function closeModal() { document.getElementById("linkModal").style.display = "none"; }
    function saveLink() {
      const url = document.getElementById("linkUrl").value.trim();
      const text = document.getElementById("linkText").value.trim();
      const favicon = document.getElementById("linkFavicon").value.trim();
      if (!url || !text) return alert("URL and Text are required.");
      const links = JSON.parse(localStorage.getItem(quickLinksKey)) || [];
      links.push({ url, text, favicon });
      localStorage.setItem(quickLinksKey, JSON.stringify(links));
      closeModal(); renderLinks(links);
    }
    function deleteLink(index) {
      const links = JSON.parse(localStorage.getItem(quickLinksKey)) || [];
      links.splice(index, 1);
      localStorage.setItem(quickLinksKey, JSON.stringify(links));
      renderLinks(links);
    }
    function execSearch(searchQuery) {
      const query = searchQuery || document.getElementById("search").value.trim();
      if (!query) return;
      let url;
      if (query.includes("!p ")) {
        url = `https://www.perplexity.ai/search?q=${encodeURIComponent(query.replace("!p ", "").trim())}`;
      } else if (query.includes("!s")) {
        url = `https://www.stayonline.com/pc_combined_results.asp?search_prod=(searchlike~p.sku~${encodeURIComponent(query.replace("!s ", "").trim())})`;
      } else {
        url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
      }
      saveRecentSearch(query);
      window.location = url;
    }
    function linkify(text) {
      const escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return escaped.replace(/(https?:\/\/[^\s]+)/g, url =>
        `<a href="${url}" target="_blank" onclick="event.stopPropagation()">${url}</a>`
      );
    }
    function createBlock(data = null) {
      const block = document.createElement("div");
      block.className = "block";
      block.style.left = (data?.x || Math.random() * window.innerWidth * 0.6) + "px";
      block.style.top  = (data?.y || Math.random() * window.innerHeight * 0.6) + "px";
      const title = document.createElement("div");
      title.className = "block-title";
      title.textContent = data?.title || "Title...";
      title.contentEditable = true;
      title.addEventListener("input", saveBlocks);
      block.appendChild(title);
      const content = document.createElement("div");
      content.className = "block-content";
      content.innerHTML = linkify(data?.content || "Content...");
      content.contentEditable = true;
      content.addEventListener("mousedown", (e) => {
        if (e.target.tagName === "A") { e.preventDefault(); e.stopPropagation(); window.open(e.target.href, "_blank"); }
      });
      content.addEventListener("focus", () => { content.textContent = content.textContent; });
      content.addEventListener("blur", () => { content.innerHTML = linkify(content.textContent); saveBlocks(); });
      content.addEventListener("input", saveBlocks);
      block.appendChild(content);
      const deleteBtn = document.createElement("a");
      deleteBtn.className = "delete-btn"; deleteBtn.textContent = "X";
      deleteBtn.style.marginRight = "10px";
      deleteBtn.onclick = () => { block.remove(); saveBlocks(); };
      block.appendChild(deleteBtn);
      const date = document.createElement("div");
      date.className = "block-date";
      date.textContent = "Created: " + (data?.created || new Date().toLocaleString());
      block.appendChild(date);
      document.body.appendChild(block);
      block.onmousedown = function (e) {
        if (e.target.className && String(e.target.className).includes("delete-btn")) return;
        if (e.target.tagName === "A") return;
        let offsetX = e.clientX - block.getBoundingClientRect().left;
        let offsetY = e.clientY - block.getBoundingClientRect().top;
        document.onmousemove = function (e) {
          block.style.left = e.clientX - offsetX + "px";
          block.style.top  = e.clientY - offsetY + "px";
        };
        document.onmouseup = () => { document.onmousemove = null; document.onmouseup = null; saveBlocks(); };
      };
    }
    function saveBlocks() {
      const blocks = [...document.querySelectorAll(".block")].map(b => ({
        x: parseFloat(b.style.left), y: parseFloat(b.style.top),
        title: b.querySelector(".block-title").textContent,
        content: b.querySelector(".block-content").textContent,
        created: b.querySelector(".block-date").textContent.replace("Created: ", "")
      }));
      localStorage.setItem("stickyBlocks", JSON.stringify(blocks));
    }
    function loadBlocks() {
      JSON.parse(localStorage.getItem("stickyBlocks") || "[]").forEach(createBlock);
    }

    /* ======================================================
       EFFECTS SYSTEM
       ====================================================== */

    const EFFECT_KEYS = {
      butterflies: 'soDashboard.butterflies',
      fireflies:   'soDashboard.fireflies',
      leaves:      'soDashboard.leaves',
      rain:        'soDashboard.rain',
      breathe:     'soDashboard.breathe',
      aurora:      'soDashboard.aurora',
      sunny:       'soDashboard.sunny',
      analogtv:    'soDashboard.analogtv'
    };
    const EFFECT_LABELS = {
      butterflies: '\u{1F98B} Butterflies',
      fireflies:   '\u2728 Fireflies',
      leaves:      '\u{1F342} Leaves',
      rain:        '\u{1F327} Rain',
      breathe:     '\u{1FAC1} Breathe',
      aurora:      '\u{1F30C} Aurora',
      sunny:       '\u2600\uFE0F Sunny Day',
      analogtv:    '\u{1F4FA} Analog TV'
    };
    const effects = { butterflies: false, fireflies: false, leaves: false, rain: false, breathe: false, aurora: false, sunny: false, analogtv: false };

    /* --- Particle canvas --- */
    const particleCanvas = document.getElementById('particleCanvas');
    const pctx = particleCanvas.getContext('2d');
    particleCanvas.width = window.innerWidth;
    particleCanvas.height = window.innerHeight;
    window.addEventListener('resize', () => {
      particleCanvas.width = window.innerWidth;
      particleCanvas.height = window.innerHeight;
    });

    let mouse = { x: -9999, y: -9999 };
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    /* --- Butterflies --- */
    let butterfliesList = [];
    const EVASION_RADIUS = 120, EVASION_FORCE = 4, MAX_SPEED = 5, CRUISE_SPEED = 2;
    let bfLandTimer = 600 + Math.random() * 400;

    function mkButterfly() {
      const heading = Math.random() * Math.PI * 2;
      const vx = Math.cos(heading) * 1.5, vy = Math.sin(heading) * 1.5;
      return { x: Math.random() * innerWidth, y: Math.random() * innerHeight, vx, vy, cvx: vx, cvy: vy,
               wingPhase: Math.random() * Math.PI * 2, wingSpeed: 0.18 + Math.random() * 0.12,
               heading, turnRate: (Math.random() * 0.018 + 0.006) * (Math.random() < 0.5 ? 1 : -1),
               turnTimer: 80 + Math.random() * 160,
               state: 'flying', landX: 0, landY: 0 };
    }

    function landButterflies() {
      const cx = 150 + Math.random() * (innerWidth  - 300);
      const cy = 150 + Math.random() * (innerHeight - 300);
      for (const b of butterfliesList) {
        if (b.state !== 'flying') continue;
        b.state = 'landing';
        b.landX = cx + (Math.random() - 0.5) * 80;
        b.landY = cy + (Math.random() - 0.5) * 60;
      }
    }

    function wakeButterfly(b) {
      b.state = 'flying';
      const a = Math.random() * Math.PI * 2;
      b.heading = a;
      b.vx = Math.cos(a) * MAX_SPEED; b.vy = Math.sin(a) * MAX_SPEED;
    }

    function tickButterfly(b) {
      if (b.state === 'landed') {
        const dx = b.x - mouse.x, dy = b.y - mouse.y;
        if (Math.hypot(dx, dy) < EVASION_RADIUS) wakeButterfly(b);
        b.wingPhase += b.wingSpeed * 0.08;  // slow resting flutter
        return;
      }

      if (b.state === 'landing') {
        const dx = b.x - mouse.x, dy = b.y - mouse.y;
        if (Math.hypot(dx, dy) < EVASION_RADIUS) { wakeButterfly(b); return; }
        const tx = b.landX - b.x, ty = b.landY - b.y, td = Math.hypot(tx, ty);
        if (td < 3) { b.x = b.landX; b.y = b.landY; b.vx = 0; b.vy = 0; b.state = 'landed'; return; }
        const accel = Math.min(0.6, 0.15 + td * 0.004);
        b.vx += (tx / td) * accel; b.vy += (ty / td) * accel;
        b.vx *= 0.88; b.vy *= 0.88;
        b.x += b.vx; b.y += b.vy;
        b.wingPhase += b.wingSpeed;
        return;
      }

      // flying
      if (--b.turnTimer <= 0) {
        b.turnRate = (Math.random() * 0.018 + 0.006) * (Math.random() < 0.5 ? 1 : -1);
        b.turnTimer = 80 + Math.random() * 160;
      }
      b.heading += b.turnRate;
      b.cvx = Math.cos(b.heading) * CRUISE_SPEED;
      b.cvy = Math.sin(b.heading) * CRUISE_SPEED;
      const dx = b.x - mouse.x, dy = b.y - mouse.y, dist = Math.hypot(dx, dy);
      if (dist < EVASION_RADIUS && dist > 0) {
        const f = (EVASION_RADIUS - dist) / EVASION_RADIUS * EVASION_FORCE;
        b.vx += dx/dist*f; b.vy += dy/dist*f;
      }
      b.vx += (b.cvx - b.vx) * 0.03; b.vy += (b.cvy - b.vy) * 0.03;
      const s = Math.hypot(b.vx, b.vy);
      if (s > MAX_SPEED) { b.vx = b.vx/s*MAX_SPEED; b.vy = b.vy/s*MAX_SPEED; }
      const sp = Math.hypot(b.vx, b.vy);
      if (sp > 0) {
        const px = -b.vy / sp, py = b.vx / sp;
        const zig = Math.sin(b.wingPhase) * 0.25;
        b.vx += px * zig; b.vy += py * zig;
      }
      b.x += b.vx; b.y += b.vy;
      if (b.x < 0 || b.x > innerWidth)  { b.vx *= -1; b.heading = Math.PI - b.heading; }
      if (b.y < 0 || b.y > innerHeight) { b.vy *= -1; b.heading = -b.heading; }
      b.wingPhase += b.wingSpeed;
    }

    /* --- Fireflies --- */
    let firefliesList = [];
    let fireflySync = 600 + Math.floor(Math.random() * 600);
    let syncFade = 0;
    const SYNC_FADE_DUR = 50;

    function mkFirefly() {
      return {
        x: Math.random() * innerWidth, y: Math.random() * innerHeight,
        vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
        opacity: 0, phase: 'dark', timer: Math.floor(Math.random() * 300),
        blinksLeft: 0,
        r: 2.5 + Math.random() * 2,
        hue: 55 + Math.floor(Math.random() * 55)
      };
    }
    function tickFirefly(f) {
      f.vx += (Math.random() - 0.5) * 0.04; f.vy += (Math.random() - 0.5) * 0.04;
      const s = Math.hypot(f.vx, f.vy);
      if (s > 0.7) { f.vx = f.vx/s*0.7; f.vy = f.vy/s*0.7; }
      if (f.phase === 'dark') {
        f.opacity = 0;
        if (--f.timer <= 0) { f.phase = 'rising'; f.blinksLeft = 1; }
      } else if (f.phase === 'rising') {
        f.opacity += 0.06;
        if (f.opacity >= 1) { f.opacity = 1; f.phase = 'lit'; f.timer = 6 + Math.floor(Math.random() * 12); }
      } else if (f.phase === 'lit') {
        if (--f.timer <= 0) { f.phase = 'falling'; }
      } else if (f.phase === 'falling') {
        f.opacity -= 0.04;
        if (f.opacity <= 0) {
          f.opacity = 0;
          if (f.blinksLeft > 0) { f.phase = 'pause'; f.timer = 8 + Math.floor(Math.random() * 10); f.blinksLeft--; }
          else { f.phase = 'dark'; f.timer = 150 + Math.floor(Math.random() * 250); }
        }
      } else { // pause between blinks
        if (--f.timer <= 0) { f.phase = 'rising'; }
      }
      f.x += f.vx; f.y += f.vy;
      if (f.x < 0) f.x = innerWidth;  else if (f.x > innerWidth)  f.x = 0;
      if (f.y < 0) f.y = innerHeight; else if (f.y > innerHeight) f.y = 0;
    }
    function drawFirefly(f) {
      const op = syncFade > 0 ? f.opacity * (syncFade / SYNC_FADE_DUR) : f.opacity;
      const g = pctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r * 5);
      g.addColorStop(0, `hsla(${f.hue},100%,78%,${op})`);
      g.addColorStop(1, `hsla(${f.hue},100%,60%,0)`);
      pctx.fillStyle = g;
      pctx.beginPath(); pctx.arc(f.x, f.y, f.r * 5, 0, Math.PI*2); pctx.fill();
      pctx.fillStyle = `hsla(${f.hue},100%,97%,${op})`;
      pctx.beginPath(); pctx.arc(f.x, f.y, f.r * 0.45, 0, Math.PI*2); pctx.fill();
    }

    /* --- Falling leaves --- */
    let leavesList = [];
    const LEAF_EMOJIS = ['\u{1F342}', '\u{1F341}', '\u{1F343}'];

    function mkLeaf(startY) {
      return {
        x: Math.random() * innerWidth,
        y: startY !== undefined ? startY : -30,
        vy: 0.8 + Math.random() * 1.2,
        rot: Math.random() * Math.PI * 2,
        rotSpd: (Math.random() - 0.5) * 0.04,
        swayA: Math.random() * Math.PI * 2,
        swaySpd: 0.018 + Math.random() * 0.02,
        swayAmp: 0.4 + Math.random() * 0.9,
        size: 16 + Math.floor(Math.random() * 12),
        emoji: LEAF_EMOJIS[Math.floor(Math.random() * 3)]
      };
    }
    function initLeaves() {
      leavesList = Array.from({length: 20}, () => mkLeaf(Math.random() * innerHeight));
    }
    function tickLeaf(l) {
      l.swayA += l.swaySpd;
      l.rot += l.rotSpd;
      l.x += Math.sin(l.swayA) * l.swayAmp;
      l.y += l.vy;
    }
    function drawLeaf(l) {
      pctx.save();
      pctx.translate(l.x, l.y);
      pctx.rotate(l.rot);
      pctx.font = `${l.size}px serif`;
      pctx.fillText(l.emoji, -l.size/2, l.size/2);
      pctx.restore();
    }

    /* --- Rain --- */
    let rainDrops = [];

    function mkDrop(spreadY) {
      return {
        x: Math.random() * (innerWidth + 300) - 100,
        y: spreadY ? Math.random() * innerHeight : -20,
        len: 12 + Math.random() * 14,
        spd: 10 + Math.random() * 7,
        op: 0.22 + Math.random() * 0.32
      };
    }
    function initRain() {
      rainDrops = Array.from({length: 130}, () => mkDrop(true));
    }
    function drawDrop(r) {
      pctx.beginPath();
      pctx.moveTo(r.x, r.y);
      pctx.lineTo(r.x - r.len * 0.25, r.y + r.len);
      pctx.strokeStyle = `rgba(174,210,240,${r.op})`;
      pctx.lineWidth = 1;
      pctx.stroke();
    }

    /* --- Sunny Day --- */
    let sunTime = 0;
    let cloudsList = [];

    function mkCloud(spreadX) {
      return {
        x: spreadX !== undefined ? spreadX : -220,
        y: 40 + Math.random() * innerHeight * 0.28,
        speed: 0.15 + Math.random() * 0.25,
        scale: 0.7 + Math.random() * 0.9,
        opacity: 0.75 + Math.random() * 0.2,
        dir: 1
      };
    }
    function initSunny() {
      cloudsList = Array.from({length: 5}, () => mkCloud(Math.random() * innerWidth));
    }
    function drawCloud(c) {
      pctx.save();
      pctx.globalAlpha = c.opacity;
      pctx.fillStyle = 'rgba(255,255,255,0.95)';
      const s = c.scale;
      pctx.beginPath();
      pctx.arc(c.x,          c.y,          s * 28, 0, Math.PI * 2);
      pctx.arc(c.x + s * 40, c.y - s * 12, s * 38, 0, Math.PI * 2);
      pctx.arc(c.x + s * 82, c.y,          s * 28, 0, Math.PI * 2);
      pctx.arc(c.x + s * 44, c.y + s * 14, s * 25, 0, Math.PI * 2);
      pctx.fill();
      pctx.restore();
    }
    function drawSunOnCanvas() {
      sunTime += 0.001;
      const sx = innerWidth - 110, sy = 95, r = 48;
      const numRays = 10, halfWidth = 0.055;
      const maxDist = Math.hypot(innerWidth, innerHeight) * 1.5;

      // Full-viewport ray beams (drawn before glow so sun sits on top)
      for (let i = 0; i < numRays; i++) {
        const angle = (i / numRays) * Math.PI * 2 + sunTime;
        const la = angle - halfWidth, ra = angle + halfWidth;
        const ex = sx + Math.cos(angle) * maxDist;
        const ey = sy + Math.sin(angle) * maxDist;
        const grad = pctx.createLinearGradient(sx, sy, ex, ey);
        grad.addColorStop(0,    'rgba(255,235,80,0.32)');
        grad.addColorStop(0.12, 'rgba(255,220,60,0.15)');
        grad.addColorStop(0.45, 'rgba(255,200,40,0.06)');
        grad.addColorStop(1,    'rgba(255,180,0,0)');
        pctx.save();
        pctx.fillStyle = grad;
        pctx.beginPath();
        pctx.moveTo(sx + Math.cos(la) * r, sy + Math.sin(la) * r);
        pctx.lineTo(sx + Math.cos(la) * maxDist, sy + Math.sin(la) * maxDist);
        pctx.lineTo(sx + Math.cos(ra) * maxDist, sy + Math.sin(ra) * maxDist);
        pctx.lineTo(sx + Math.cos(ra) * r, sy + Math.sin(ra) * r);
        pctx.closePath();
        pctx.fill();
        pctx.restore();
      }

      // Outer glow
      const glow = pctx.createRadialGradient(sx, sy, 0, sx, sy, r * 3);
      glow.addColorStop(0,   'rgba(255,240,80,0.35)');
      glow.addColorStop(0.5, 'rgba(255,200,0,0.12)');
      glow.addColorStop(1,   'rgba(255,180,0,0)');
      pctx.fillStyle = glow;
      pctx.beginPath();
      pctx.arc(sx, sy, r * 3, 0, Math.PI * 2);
      pctx.fill();

      // Sun body
      const sunGrad = pctx.createRadialGradient(sx - 12, sy - 12, 0, sx, sy, r);
      sunGrad.addColorStop(0,    '#fffde0');
      sunGrad.addColorStop(0.35, '#ffe030');
      sunGrad.addColorStop(1,    '#ff8c00');
      pctx.fillStyle = sunGrad;
      pctx.beginPath();
      pctx.arc(sx, sy, r, 0, Math.PI * 2);
      pctx.fill();
    }

    /* --- Rainbow (sun + rain combo) --- */
    function drawRainbow() {
      const cx = innerWidth / 2;
      const cy = innerHeight * 1.05;
      const outerR = innerWidth * 0.62;
      const bandW = 18;
      const bands = [
        [255,  20,  20],
        [255, 110,   0],
        [255, 220,   0],
        [  0, 195,  50],
        [  0, 105, 255],
        [ 75,   0, 195],
        [170,   0, 215],
      ];
      pctx.save();
      for (let i = 0; i < bands.length; i++) {
        const [r, g, b] = bands[i];
        const radius = outerR - i * bandW;
        if (radius <= 0) continue;
        pctx.beginPath();
        pctx.arc(cx, cy, radius, Math.PI, 0); // clockwise through top → arch shape
        pctx.strokeStyle = `rgba(${r},${g},${b},0.45)`;
        pctx.lineWidth = bandW + 2;
        pctx.stroke();
      }
      pctx.restore();
    }

    /* --- Main particle loop --- */
    let particleRaf = null;

    function particleLoop() {
      pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

      if (effects.butterflies) {
        if (--bfLandTimer <= 0) {
          landButterflies();
          bfLandTimer = 700 + Math.random() * 500;
        }
        pctx.font = '24px serif';
        for (const b of butterfliesList) {
          tickButterfly(b);
          // landed: wings fully open; landing: slowing flutter; flying: full flutter
          const flutterAmt = b.state === 'landed' ? 0.32 : 1;
          const scaleX = Math.abs(Math.sin(b.wingPhase)) * (0.85 * flutterAmt) + (1 - 0.85 * flutterAmt);
          pctx.save();
          pctx.translate(b.x + 12, b.y - 12);
          pctx.scale(scaleX, 1);
          pctx.fillText('\u{1F98B}', -12, 12);
          pctx.restore();
        }
      }
      if (effects.fireflies) {
        if (--fireflySync <= 0) {
          syncFade = SYNC_FADE_DUR;
          fireflySync = 600 + Math.floor(Math.random() * 600);
        }
        if (syncFade > 0) {
          if (--syncFade === 0) {
            for (const f of firefliesList) { f.phase = 'dark'; f.timer = 30; f.blinksLeft = 1; }
          }
        }
        for (const f of firefliesList) { tickFirefly(f); drawFirefly(f); }
      }
      if (effects.leaves) {
        for (let i = leavesList.length - 1; i >= 0; i--) {
          const l = leavesList[i]; tickLeaf(l); drawLeaf(l);
          if (l.y > innerHeight + 30) leavesList.splice(i, 1, mkLeaf());
        }
      }
      if (effects.sunny && effects.rain) drawRainbow();
      if (effects.rain) {
        for (let i = rainDrops.length - 1; i >= 0; i--) {
          const r = rainDrops[i];
          r.x -= 2.5; r.y += r.spd;
          drawDrop(r);
          if (r.y > innerHeight + 20 || r.x < -60) rainDrops.splice(i, 1, mkDrop(false));
        }
      }

      if (effects.sunny) {
        drawSunOnCanvas();
        for (let i = cloudsList.length - 1; i >= 0; i--) {
          const c = cloudsList[i];
          c.x += c.speed * c.dir;
          drawCloud(c);
          if (c.x > innerWidth + 220) cloudsList.splice(i, 1, mkCloud());
        }
      }

      if (effects.butterflies || effects.fireflies || effects.leaves || effects.rain || effects.sunny) {
        particleRaf = requestAnimationFrame(particleLoop);
      } else {
        particleRaf = null;
        pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
      }
    }

    function ensureParticleLoop() {
      if (!particleRaf) particleLoop();
    }

    /* --- Breathing guide --- */
    let breathPhase = 'inhale', breathStart = 0, breathRaf = null;
    const BREATH = {
      inhale: { dur: 4000, next: 'hold',   label: 'Inhale' },
      hold:   { dur: 2000, next: 'exhale', label: 'Hold'   },
      exhale: { dur: 6000, next: 'pause',  label: 'Exhale' },
      pause:  { dur: 2000, next: 'inhale', label: 'Pause'  }
    };

    function breathLoop() {
      // Advance phase on completion
      while (Date.now() - breathStart >= BREATH[breathPhase].dur) {
        breathStart += BREATH[breathPhase].dur;
        breathPhase = BREATH[breathPhase].next;
      }
      const t = (Date.now() - breathStart) / BREATH[breathPhase].dur;
      document.getElementById('breathLabel').textContent = BREATH[breathPhase].label;
      let scale;
      if      (breathPhase === 'inhale') scale = 0.5 + t * 0.5;
      else if (breathPhase === 'hold')   scale = 1.0;
      else if (breathPhase === 'exhale') scale = 1.0 - t * 0.5;
      else                               scale = 0.5;
      const circle = document.getElementById('breathCircle');
      circle.style.transform = `scale(${scale})`;
      circle.style.opacity = 0.3 + scale * 0.7;
      breathRaf = requestAnimationFrame(breathLoop);
    }

    /* --- Aurora --- */
    let auroraRaf = null, auroraTime = 0;

    function isDarkMode() {
      return rootEl.getAttribute('data-theme') === 'dark' ||
        (!rootEl.getAttribute('data-theme') && getSystemPrefersDark());
    }
    function auroraLoop() {
      auroraTime += 0.003;
      const x1 = 50 + Math.sin(auroraTime * 0.7) * 30;
      const y1 = 20 + Math.cos(auroraTime * 0.5) * 15;
      const x2 = 65 + Math.sin(auroraTime * 0.4 + 1.2) * 28;
      const y2 = 55 + Math.cos(auroraTime * 0.6 + 2.1) * 22;
      const x3 = 35 + Math.sin(auroraTime * 0.3 + 2.5) * 20;
      const y3 = 40 + Math.cos(auroraTime * 0.8 + 0.8) * 18;
      if (isDarkMode()) {
        document.body.style.background = `
          radial-gradient(ellipse 90% 55% at ${x1}% ${y1}%, rgba(0,255,150,0.09) 0%, transparent 65%),
          radial-gradient(ellipse 65% 75% at ${x2}% ${y2}%, rgba(90,40,255,0.09) 0%, transparent 65%),
          radial-gradient(ellipse 70% 50% at ${x3}% ${y3}%, rgba(0,200,255,0.07) 0%, transparent 60%),
          radial-gradient(1200px 800px at 70% 20%, #101827 0%, #0b1426 55%, #070b14 100%)`;
      } else {
        document.body.style.background = `
          radial-gradient(ellipse 90% 55% at ${x1}% ${y1}%, rgba(0,190,130,0.07) 0%, transparent 65%),
          radial-gradient(ellipse 65% 75% at ${x2}% ${y2}%, rgba(100,70,220,0.06) 0%, transparent 65%),
          radial-gradient(ellipse 70% 50% at ${x3}% ${y3}%, rgba(0,160,220,0.05) 0%, transparent 60%),
          linear-gradient(135deg, #f9f9f9, #eef3f9)`;
      }
      auroraRaf = requestAnimationFrame(auroraLoop);
    }
    function stopAurora() {
      cancelAnimationFrame(auroraRaf); auroraRaf = null;
      document.body.style.background = '';
    }

    /* --- Analog TV --- */
    let tvCanvas = null, tvCtx = null, tvRaf = null, tvTime = 0;
    let tvNoiseCanvas = null, tvNoiseCW = 0, tvNoiseCH = 0;
    let tvBands = [];

    function initAnalogTV() {
      if (!tvCanvas) {
        tvCanvas = document.createElement('canvas');
        tvCanvas.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:2;';
        document.body.appendChild(tvCanvas);
      }
      if (!tvNoiseCanvas) tvNoiseCanvas = document.createElement('canvas');
      tvCanvas.width  = window.innerWidth;
      tvCanvas.height = window.innerHeight;
      tvCtx = tvCanvas.getContext('2d');
      tvBands = [];
    }

    function tvLoop() {
      tvTime += 0.016;
      const w = window.innerWidth, h = window.innerHeight;
      if (tvCanvas.width !== w || tvCanvas.height !== h) {
        tvCanvas.width = w; tvCanvas.height = h;
      }
      tvCtx.clearRect(0, 0, w, h);

      // Noise grain via downsampled offscreen canvas
      const sw = 400, sh = Math.round(400 * h / w);
      if (tvNoiseCW !== sw || tvNoiseCH !== sh) {
        tvNoiseCanvas.width = sw; tvNoiseCanvas.height = sh;
        tvNoiseCW = sw; tvNoiseCH = sh;
      }
      const nctx = tvNoiseCanvas.getContext('2d');
      const id = nctx.createImageData(sw, sh);
      const d = id.data;
      for (let i = 0; i < d.length; i += 4) {
        if (Math.random() < 0.065) {
          const v = (Math.random() * 210) | 0;
          d[i] = v; d[i+1] = v; d[i+2] = v;
          d[i+3] = (55 + Math.random() * 110) | 0;
        }
      }
      nctx.putImageData(id, 0, 0);
      tvCtx.save();
      tvCtx.imageSmoothingEnabled = false;
      tvCtx.globalAlpha = 0.42;
      tvCtx.drawImage(tvNoiseCanvas, 0, 0, w, h);
      tvCtx.restore();

      // Scanlines
      tvCtx.save();
      for (let y = 0; y < h; y += 3) {
        tvCtx.fillStyle = 'rgba(0,0,0,0.14)';
        tvCtx.fillRect(0, y, w, 1);
      }
      tvCtx.restore();

      // Horizontal tracking bands
      if (Math.random() < 0.018) {
        tvBands.push({
          y: Math.random() * h,
          bh: 1 + Math.random() * 5,
          alpha: 0.35 + Math.random() * 0.45,
          life: 1.0,
          decay: 0.025 + Math.random() * 0.055,
          speed: 1.2 + Math.random() * 3.5
        });
      }
      for (let i = tvBands.length - 1; i >= 0; i--) {
        const b = tvBands[i];
        tvCtx.save();
        tvCtx.globalAlpha = b.life * b.alpha;
        tvCtx.fillStyle = 'rgba(210,220,255,0.7)';
        tvCtx.fillRect(0, b.y | 0, w, b.bh | 0);
        tvCtx.restore();
        b.y += b.speed;
        b.life -= b.decay;
        if (b.life <= 0 || b.y > h) tvBands.splice(i, 1);
      }

      // Vignette / CRT curvature darkening
      tvCtx.save();
      const vg = tvCtx.createRadialGradient(w/2, h/2, h * 0.22, w/2, h/2, Math.max(w, h) * 0.75);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(0,0,0,0.62)');
      tvCtx.fillStyle = vg;
      tvCtx.fillRect(0, 0, w, h);
      tvCtx.restore();

      // Subtle flicker
      if (Math.random() < 0.045) {
        tvCtx.save();
        tvCtx.fillStyle = `rgba(255,255,255,${0.015 + Math.random() * 0.045})`;
        tvCtx.fillRect(0, 0, w, h);
        tvCtx.restore();
      }

      tvRaf = requestAnimationFrame(tvLoop);
    }

    function stopAnalogTV() {
      cancelAnimationFrame(tvRaf); tvRaf = null;
      if (tvCtx) tvCtx.clearRect(0, 0, tvCanvas.width, tvCanvas.height);
    }

    /* --- Toggle logic --- */
    function toggleEffect(name) {
      effects[name] = !effects[name];
      localStorage.setItem(EFFECT_KEYS[name], effects[name] ? 'on' : 'off');
      updateEffectBtn(name);

      switch (name) {
        case 'butterflies':
          if (effects.butterflies) butterfliesList = Array.from({length: 20}, mkButterfly);
          else butterfliesList = [];
          break;
        case 'fireflies':
          if (effects.fireflies) firefliesList = Array.from({length: 45}, mkFirefly);
          else firefliesList = [];
          break;
        case 'leaves':
          if (effects.leaves) initLeaves();
          else leavesList = [];
          break;
        case 'rain':
          if (effects.rain) initRain();
          else rainDrops = [];
          break;
        case 'breathe': {
          const guide = document.getElementById('breathingGuide');
          const dim   = document.getElementById('breathDim');
          if (effects.breathe) {
            dim.style.display = 'block';
            guide.style.display = 'block';
            breathPhase = 'inhale'; breathStart = Date.now();
            breathLoop();
          } else {
            dim.style.display = 'none';
            guide.style.display = 'none';
            cancelAnimationFrame(breathRaf); breathRaf = null;
          }
          break;
        }
        case 'aurora':
          if (effects.aurora) auroraLoop();
          else stopAurora();
          break;
        case 'analogtv':
          if (effects.analogtv) { initAnalogTV(); tvLoop(); }
          else stopAnalogTV();
          break;
        case 'sunny':
          if (effects.sunny) {
            initSunny();
            if (isDarkMode()) {
              document.body.style.background = 'radial-gradient(ellipse at 85% 12%, rgba(255,210,60,0.18) 0%, transparent 45%), radial-gradient(1200px 800px at 70% 20%, #101827 0%, #0b1426 55%, #070b14 100%)';
            } else {
              document.body.style.background = 'linear-gradient(180deg, #87ceeb 0%, #b8e4f7 30%, #dff0f8 65%, #f0f8ff 100%)';
            }
          } else {
            cloudsList = [];
            document.body.style.background = '';
          }
          break;
      }

      if (effects.butterflies || effects.fireflies || effects.leaves || effects.rain || effects.sunny) ensureParticleLoop();
    }

    function updateEffectBtn(name) {
      const btn = document.getElementById('btn-' + name);
      btn.textContent = `${EFFECT_LABELS[name]}: ${effects[name] ? 'On' : 'Off'}`;
      btn.dataset.active = effects[name] ? 'true' : 'false';
    }

    function restoreEffects() {
      for (const name of Object.keys(effects)) {
        if (localStorage.getItem(EFFECT_KEYS[name]) === 'on') toggleEffect(name);
      }
    }

    /* === BOOT === */
    window.onload = () => {
      initTheme();
      ensurePageFavicon();
      loadLinks();
      loadBlocks();
      renderRecentSearches();
      restoreEffects();
    };
  </script>
</body>
